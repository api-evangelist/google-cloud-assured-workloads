name: Google Cloud Assured Workloads
description: >-
  Google Cloud Assured Workloads enables organizations to create and manage
  compliance-controlled environments on Google Cloud. It provides guardrails for
  regulatory compliance frameworks such as FedRAMP, HIPAA, CJIS, ITAR, and
  others by enforcing organizational policies, data residency requirements, and
  access controls on cloud resources within designated workload environments.
