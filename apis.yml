apis:
  - name: Assured Workloads API
    description: >-
      The Assured Workloads API enables developers to programmatically create, manage, and monitor compliance-controlled
      workload environments on Google Cloud. It supports creating workloads with specific compliance regimes, managing
      organizational policies, monitoring compliance violations, and configuring data residency and access controls. The
      API helps organizations maintain regulatory compliance across their cloud infrastructure.
